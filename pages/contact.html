<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Bali Tourism</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../images/favicon.png">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav>
            <ul class="head-ul-one">
                <li><img src="../images/Untitled_design-removebg-preview.jpg" alt=""></li>
            </ul>
            <ul class="head-ul-two">
                <div class="first">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="highlights.html">Highlights</a></li>
                    <li><a href="attractions.html">Attractions</a></li>
                    <li><a href="tips.html">Travel Tips</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                </div>
                <div class="second">
                    <li><a href="contact.html"><i class="fa-solid fa-phone"></i> Contact</a></li>
                    <li><a href="facebook.com"><i class="fa-brands fa-facebook"></i>Facebook</a></li>
                    <li><a href="Instagram.com"><i class="fa-brands fa-instagram"></i>Instagram</a></li>
                </div>
            </ul>
        </nav>
    </header>

    <!-- Hero Banner -->
    <section class="hero" style="background-image: url('../images/bali-tips.jpg');">
        <div class="hero-text">
            <h1>Contact Us</h1>
            <p>We’d love to hear from you!</p>
        </div>
    </section>

    <!-- Contact Form -->
    <section class="form-section">
        <h2>Send us your feedback</h2>
        <form action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Write your message here"></textarea>

            <button type="submit" class="btn">Submit</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Bali Tourism Website | Designed for COM4014</p>
        <p>Follow us: 🌐 Facebook | 📸 Instagram | 🐦 Twitter</p>
    </footer>
</body>
</html>
